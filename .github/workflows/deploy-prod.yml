name: Release Gate (release/* → main)

# Fires when a PR targeting `main` is opened, reopened, or updated.
# `branches` filters the BASE (target) branch; the head (source) branch
# is filtered separately in the `if:` guard below, since pull_request
# events don't support head-branch filtering natively.
on:
  pull_request:
    # `labeled`/`unlabeled` are required so that adding or removing the
    # `hotfix` label re-runs the workflow and re-evaluates the checks.
    types: [opened, reopened, synchronize, labeled, unlabeled]
    branches:
      - main

# Cancel an in-flight run if the PR is updated again, so we don't
# queue duplicate approvals for the same PR.
concurrency:
  group: release-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # STAGE 1 — runs automatically. No approval needed.
  # ──────────────────────────────────────────────────────────────
  uat-validate:
    name: UAT Validate
    # NOTE: deliberately NO job-level `if:`. This job must run for EVERY PR
    # into main so that, when required in branch protection, it always
    # reports a real status. A *skipped* required check counts as passing,
    # which would let non-release PRs slip into main and bypass the gate.
    runs-on: ubuntu-latest
    steps:
      # Hard-fail (not skip) any PR whose SOURCE branch isn't release/*.
      # This is the gatekeeper: require "UAT Validate" in branch protection
      # and non-release PRs get a genuine ❌ that blocks the merge.
      - name: Enforce source branch is release/*
        if: ${{ !startsWith(github.head_ref, 'release/') }}
        run: |
          echo "::error::Only release/* branches may merge into main (got '${{ github.head_ref }}')."
          exit 1

      - name: Check out PR code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Hotfix PRs (carrying the `hotfix` label) take the AGILE path:
      # UAT is skipped, so this required check auto-passes and only the
      # pre-prod approval gate applies. A skipped *step* still lets the
      # job report success — which is exactly "UAT not required for hotfix".
      - name: Skip UAT (hotfix label present)
        if: ${{ contains(github.event.pull_request.labels.*.name, 'hotfix') }}
        run: echo "Hotfix label present — skipping UAT; only pre-prod approval gates this PR."

      # Normal release PRs run the real UAT validation.
      # TODO(you): replace with your project's actual UAT checks.
      - name: Run UAT validation
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'hotfix') }}
        run: |
          echo "UAT validation completed"

  # ──────────────────────────────────────────────────────────────
  # STAGE 2 — gated. Waits for manual approval via the environment.
  # ──────────────────────────────────────────────────────────────
  preprod-validate:
    name: Preprod Validate
    needs: [uat-validate]        # only starts after stage 1 succeeds
    runs-on: ubuntu-latest
    # ↓↓↓ THIS is the approval gate. Configure required reviewers on the
    # `production` environment in Settings → Environments. GitHub pauses
    # the run here until a reviewer clicks "Approve".
    environment:
      name: production
    steps:
      - name: Check out PR code
        uses: actions/checkout@v4

      - name: Promote
        run: |
          echo "Approved! Running stage 2 for PR #${{ github.event.pull_request.number }}"